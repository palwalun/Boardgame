apiVersion: apps/v1
kind: StatefulSet
metadata: 
 name: Boardgame-statefuleset
 labels:
  app: boardgame
spec:
 replicas: 2
 selector:
  matchLabels:
   app: boardgame
 template:
  metadata:
   name: boardgame-statefulset
   labels:
    app: boardgame
  spec:
   containers:
    - name: db-container
      image: postgres:15
      ports:
       - containerPort: 5432
      env:
        - name: POSTGRES_USER
          valueFrom:
            secretKeyRef:
              name: postgres-secret
              key: POSTGRES_USER
        - name: POSTGRES_PASSWORD
          valueFrom:
            secretKeyRef:
              name: postgres-secret
              key: POSTGRES_PASSWORD
      volumeMounts:
        - name: postgres-storage
          mountPath: /var/lib/postgresql/data
   volumes:
      - name: postgres-storage
        persistentVolumeClaim:
           claimName: boardgame-pvc

---
apiVersion: v1
kind: Service
metadata:
 name: db-service
 labels:
  app: boardgame
spec:
 type: ClusterIP
 ports:
  - port: 5432
    targetPort: 5432