apiVersion: apps/v1
kind: Statefulset
metadata: 
 name: Boardgame-statefuleset
 labels:
  app: boardgame
spec:
 replicas: 2
 selector:
  matchLabels:
   app: boardgame
 template:
  metadata:
   name: boardgame-statefulset
   labels:
    app: boardgame
  spec:
   containers:
    - name: db-container
      image: postgres:latest
      ports:
       - containerPort: 5432
      env:
        - name: POSTGRESS_USER
          valueFrom:
            secretKeyRef:
              name: postgress-secret
              key: POSTGRESS_USER
        - name: POSTGRESS_PASSWORD
          valueFrom:
            secretKeyRef:
              name: postgress-secret
              key: POSTGRESS_PASSWORD
      volumeMounts:
        - name: postgress-storage
          mountPath: /var/lib/postgresql/data
      volumes:
        - name: postgress-storage
          persistentVolumeClaim:
           claimName: boardgame-pvc